services:
  postgres:
    image: postgres:17
    container_name: ordersystem-postgres
    environment:
      POSTGRES_DB: ordersystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ordersystem-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      
  jaeger:
    image: jaegertracing/jaeger:2.11.0
    container_name: ordersystem-jaeger
    ports:
      - "16686:16686"
    
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.0
    container_name: ordersystem-otel-collector
    command: [ "--config=/etc/otelcol-contrib/config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres-data: